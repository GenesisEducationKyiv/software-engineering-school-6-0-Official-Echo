services:
    ghchk:
        build: .
        ports:
            - "3000:3000"
            - "50051:50051"
        volumes:
            - db_data:/app/data
        environment:
            PORT: 3000
            GRPC_PORT: 50051
            DB_PATH: /app/data/app.db
            BASE_URL: ${BASE_URL:-http://localhost:3000}
            CRON_SCHEDULE: ${CRON_SCHEDULE:-"*/15 * * * *"}
            GITHUB_TOKEN: ${GITHUB_TOKEN:-}
            REDIS_URL: redis://redis:6379
            API_KEY: ${API_KEY:-}
            SMTP_HOST: ${SMTP_HOST:-}
            SMTP_PORT: ${SMTP_PORT:-587}
            SMTP_SECURE: ${SMTP_SECURE:-false}
            SMTP_USER: ${SMTP_USER:-}
            SMTP_PASS: ${SMTP_PASS:-}
            SMTP_FROM: ${SMTP_FROM:-noreply@github-notifier.dev}
        depends_on:
            - redis
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        volumes:
            - redis_data:/data

volumes:
    db_data:
    redis_data:

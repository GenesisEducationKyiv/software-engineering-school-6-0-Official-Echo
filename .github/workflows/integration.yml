name: Integration Tests

on:
  push:
  pull_request:

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and run integration tests in Docker
        run: |
          docker compose -f docker-compose.integration.yml \
            up --build --abort-on-container-exit --exit-code-from tests

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.integration.yml down -v

      - name: Copy coverage out of container
        if: always()
        run: |
          # The `tests` container writes coverage to /app/coverage/integration.
          # Extract it if the container still exists (it may have exited).
          CONTAINER=$(docker compose -f docker-compose.integration.yml ps -q tests 2>/dev/null || true)
          if [ -n "$CONTAINER" ]; then
            docker cp "$CONTAINER:/app/coverage/integration" ./coverage-integration || true
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-coverage
          path: coverage-integration/
          retention-days: 7
